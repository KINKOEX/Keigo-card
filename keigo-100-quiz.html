<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>敬語100題選擇測驗</title>
<style>
:root{--bg:#f6efe6;--paper:#fffaf2;--ink:#2f261f;--muted:#756559;--red:#bf452f;--red2:#df6a52;--gold:#d8ad62;--line:#ead8bf;--green:#2f8a54}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Noto Sans JP",Arial,sans-serif;background:linear-gradient(180deg,var(--bg),#fff8ef);color:var(--ink);-webkit-tap-highlight-color:transparent}
header{position:sticky;top:0;z-index:10;background:rgba(246,239,230,.96);backdrop-filter:blur(8px);border-bottom:1px solid var(--line);padding:14px}
h1{margin:0 0 6px;font-size:22px;font-weight:950}.sub{font-size:13px;color:var(--muted);line-height:1.5}
main{padding:14px;max-width:760px;margin:auto}.card{background:var(--paper);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:14px;box-shadow:0 8px 24px rgba(80,45,18,.08)}
h2{font-size:19px;margin:0 0 12px;border-left:5px solid var(--red);padding-left:10px}.row{display:flex;gap:8px;flex-wrap:wrap}
select,button{font:inherit;border-radius:14px;border:1px solid var(--line);padding:12px;min-height:46px}select{background:white;flex:1;min-width:140px}
button{border:0;background:var(--red);color:white;font-weight:900;cursor:pointer}button.secondary{background:#766254}button.ghost{background:white;color:var(--red);border:1px solid var(--red)}
.statGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:10px}.stat{background:white;border:1px solid var(--line);border-radius:16px;padding:12px;text-align:center}.stat b{font-size:24px;color:var(--red)}
.small{font-size:13px;color:var(--muted);line-height:1.6}.hide{display:none!important}.quizTop{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.badge{display:inline-block;background:#f0dec4;color:#6a422f;padding:4px 9px;border-radius:999px;font-size:12px;font-weight:900;margin-top:4px}
.progress{height:10px;background:#ecdcc7;border-radius:999px;overflow:hidden;margin:12px 0}.bar{height:100%;width:0;background:var(--red);transition:.25s}
.question{font-size:20px;font-weight:950;line-height:1.55;margin:14px 0}.options{display:grid;gap:10px}
.opt{width:100%;text-align:left;background:white;color:var(--ink);border:2px solid var(--line);border-radius:16px;padding:14px;font-weight:850;line-height:1.45}
.opt.correct{border-color:var(--green);background:#eaf7ef;color:#1f633e}.opt.wrong{border-color:var(--red2);background:#fff0ec;color:#9a2e1f}.opt:disabled{opacity:1}

</style></head>
<body><header><h1>敬語100題選擇測驗</h1><div class="sub">主題：尊敬語・謙讓語・丁寧語・美化語｜每次隨機出題，選項也會隨機排列</div></header>
<main>
<section id="startBox" class="card"><h2>測驗設定</h2>
<div class="row"><select id="countSelect"><option value="10">10題</option><option value="15">15題</option><option value="20">20題</option><option value="25">25題</option><option value="50">50題</option><option value="100">100題</option></select>

<select id="typeSelect"><option value="all">全部題型</option><option value="動詞對照">動詞對照</option><option value="分類判斷">分類判斷</option><option value="原形判斷">原形判斷</option><option value="句子填空">句子填空</option><option value="公式判斷">公式判斷</option><option value="情境題">情境題</option><option value="對比題">對比題</option><option value="選擇題">選擇題</option><option value="句子判斷">句子判斷</option></select></div>
<div class="statGrid"><div class="stat"><b>25</b><br><span class="small">尊敬語</span></div><div class="stat"><b>25</b><br><span class="small">謙讓語</span></div><div class="stat"><b>25</b><br><span class="small">丁寧語</span></div><div class="stat"><b>25</b><br><span class="small">美化語</span></div></div>
<p class="small">題型包含：動詞對照、分類判斷、原形判斷、句子填空、公式判斷、情境題、對比題等。</p><button id="startBtn" type="button">開始測驗</button></section>
<section id="quizBox" class="card hide"><div class="quizTop"><div><b id="qNo"></b><br><span class="badge" id="qCat"></span> <span class="badge" id="qType"></span></div><div class="small">目前分數：<b id="liveScore">0</b></div></div>
<div class="progress"><div class="bar" id="bar"></div></div><div class="question" id="question"></div><div class="options" id="options"></div><div class="explain hide" id="explain"></div>
<div class="row" style="margin-top:12px"><button id="nextBtn" class="hide" type="button">下一題</button><button id="quitBtn" class="secondary" type="button">結束測驗</button></div></section>
<section id="resultBox" class="card hide"><div class="result"><h2>測驗結果</h2><div class="score" id="finalScore"></div><p id="finalText"></p><div class="row" style="justify-content:center"><button id="againBtn" type="button">重新測驗</button><button id="reviewBtn" class="ghost" type="button">查看錯題</button></div></div><div id="wrongList" class="hide"></div></section>
<div class="footer small">本題庫依照敬語四分類設計，部分例句由GPT整理補充，請以老師講義為準。</div></main>

let quiz=[],idx=0,score=0,answered=false,wrongs=[];
function $(id){return document.getElementById(id)}
function shuffle(arr){const a=arr.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function startQuiz(){const cat=$("catSelect").value,type=$("typeSelect").value;let pool=QUESTION_BANK.filter(x=>(cat==="all"||x.cat===cat)&&(type==="all"||x.type===type));if(pool.length===0){alert("這個分類目前沒有題目，請換一個設定。");return}pool=shuffle(pool);const n=Math.min(parseInt($("countSelect").value,10),pool.length);quiz=pool.slice(0,n).map(x=>({...x,opts:shuffle(x.opts)}));idx=0;score=0;wrongs=[];answered=false;$("startBox").classList.add("hide");$("resultBox").classList.add("hide");$("wrongList").classList.add("hide");$("quizBox").classList.remove("hide");renderQuestion()}
function renderQuestion(){answered=false;const item=quiz[idx];$("qNo").textContent=`第 ${idx+1} / ${quiz.length} 題`;$("qCat").textContent=item.cat;$("qType").textContent=item.type;$("liveScore").textContent=score;$("bar").style.width=`${(idx/quiz.length)*100}%`;$("question").textContent=item.q;$("explain").classList.add("hide");$("nextBtn").classList.add("hide");const box=$("options");box.innerHTML="";item.opts.forEach(opt=>{const b=document.createElement("button");b.type="button";b.className="opt";b.textContent=opt;b.onclick=()=>choose(opt,b);box.appendChild(b)})}
function choose(opt,btn){if(answered)return;answered=true;const item=quiz[idx];[...document.querySelectorAll(".opt")].forEach(b=>{b.disabled=true;if(b.textContent===item.ans)b.classList.add("correct")});if(opt===item.ans){score++;$("liveScore").textContent=score}else{btn.classList.add("wrong");wrongs.push({...item,your:opt})}$("explain").innerHTML=`<b>答案：</b>${item.ans}<br>${item.exp}`;$("explain").classList.remove("hide");$("bar").style.width=`${((idx+1)/quiz.length)*100}%`;$("nextBtn").textContent=idx===quiz.length-1?"看結果":"下一題";$("nextBtn").classList.remove("hide")}
function nextQuestion(){if(idx<quiz.length-1){idx++;renderQuestion()}else showResult()}
function showResult(){$("quizBox").classList.add("hide");$("resultBox").classList.remove("hide");const pct=Math.round(score/quiz.length*100);$("finalScore").textContent=`${score}/${quiz.length}`;let msg=pct>=90?"很強，敬語分類和用法已經很穩。":pct>=75?"不錯，錯題再複習一次就會更穩。":pct>=60?"有基礎，但尊敬語和謙讓語容易混，要再練。":"建議先回去背四分類與基本動詞。";$("finalText").textContent=`正確率 ${pct}%｜${msg}`;renderWrongList()}
function renderWrongList(){const w=$("wrongList");if(wrongs.length===0){w.innerHTML="<h2>錯題整理</h2><p>沒有錯題，太強了。</p>";return}w.innerHTML="<h2>錯題整理</h2>"+wrongs.map((x,i)=>`<div class="reviewItem"><div class="small">${i+1}. ${x.cat}｜${x.type}</div><b>${x.q}</b><br>你的答案：<span style="color:var(--red);font-weight:900">${x.your}</span><br>正確答案：<span style="color:var(--green);font-weight:900">${x.ans}</span><br><span class="small">${x.exp}</span></div>`).join("")}
$("startBtn").onclick=startQuiz;$("nextBtn").onclick=nextQuestion;$("quitBtn").onclick=showResult;$("againBtn").onclick=()=>{$("resultBox").classList.add("hide");$("startBox").classList.remove("hide")};$("reviewBtn").onclick=()=>{$("wrongList").classList.toggle("hide")};

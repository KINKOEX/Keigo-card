<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>敬語動詞翻牌閃卡</title>
<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Helvetica Neue",Arial,sans-serif;
    background:#f6efe6;
    color:#2f261f;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
  }
  header{
    width:100%;
    text-align:center;
    padding:22px 12px 10px;
  }
  h1{font-size:1.55rem;margin:0 0 8px;}
  .hint{font-size:.95rem;color:#6e5d50;}
  .wrap{
    width:min(92vw,430px);
    margin-top:12px;
  }
  .counter{
    text-align:center;
    margin:10px 0 14px;
    color:#7b4d35;
    font-weight:700;
  }
  .card{
    height:340px;
    perspective:1000px;
    cursor:pointer;
  }
  .inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform .55s;
    transform-style:preserve-3d;
    -webkit-transform-style:preserve-3d;
  }
  .card.flipped .inner{
    transform:rotateY(180deg);
    -webkit-transform:rotateY(180deg);
  }
  .face{
    position:absolute;
    inset:0;
    border-radius:24px;
    backface-visibility:hidden;
    -webkit-backface-visibility:hidden;
    box-shadow:0 12px 28px rgba(0,0,0,.16);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:26px;
    box-sizing:border-box;
    text-align:center;
  }
  .front{
    background:#fffaf2;
    border:2px solid #c8452d;
  }
  .back{
    background:#2f261f;
    color:#fffaf2;
    transform:rotateY(180deg);
    -webkit-transform:rotateY(180deg);
    border:2px solid #d9b36c;
  }
  .label{
    font-size:.9rem;
    letter-spacing:.1em;
    color:#9b4a36;
    margin-bottom:16px;
  }
  .back .label{color:#e6c77c;}
  .word{
    font-size:2.6rem;
    font-weight:800;
    margin-bottom:12px;
  }
  .kana{
    font-size:1.1rem;
    color:#7b6a5d;
  }
  .back .kana{color:#e8d8bd;}
  .answer{
    font-size:1.12rem;
    line-height:1.85;
    opacity:0;
    visibility:hidden;
    transition:opacity .15s ease, visibility 0s linear .15s;
    word-break:keep-all;
    overflow-wrap:anywhere;
  }
  .card.showAnswer .answer{
    opacity:1;
    visibility:visible;
    transition:opacity .15s ease;
  }
  .answer b{color:#ffd88a;}
  button{
    border:none;
    border-radius:999px;
    padding:12px 18px;
    margin:18px 6px;
    font-size:1rem;
    font-weight:700;
    background:#c8452d;
    color:white;
  }
  button.secondary{
    background:#7b6a5d;
  }
  .buttons{text-align:center;}
  .mini{
    font-size:.85rem;
    color:#78685e;
    text-align:center;
    margin-top:2px;
  }

  .source-note{
    margin-top:10px;
    padding:10px 12px;
    border-top:1px solid #e3d1b8;
    line-height:1.6;
  }
</style>
</head>
<body>
<header>
  <h1>敬語動詞翻牌閃卡</h1>
  <div class="hint">前14張為講義內容，15～50張為GPT補充；點卡片翻面</div>
</header>

<div class="wrap">
  <div class="counter" id="counter"></div>

  <div class="card" id="card" onclick="flipCard()">
    <div class="inner">
      <div class="face front">
        <div class="label">普通形</div>
        <div class="word" id="frontWord"></div>
        <div class="kana" id="frontHint">點一下看敬語</div>
      </div>
      <div class="face back">
        <div class="label">敬語答案</div>
        <div class="answer" id="backAnswer"></div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button class="secondary" onclick="prevCard(event)">上一張</button>
    <button onclick="nextCard(event)">下一張</button>
  </div>
  <div class="mini">建議：先看到普通形，自己想「尊敬語／謙讓語」再翻面。</div>
  <div class="mini source-note">前14張依據講義「敬語動詞對照表」整理；第15～50張為補充。<br>本資訊由GPT蒐集提供，不一定正確。</div>
</div>

  {q:"引き受ける", a:"<b>來源：</b>GPT補充<br><b>尊敬語：</b>お引き受けになる<br><b>謙讓語：</b>承る<br><b>中文：</b>承接／接受委託"},

  {q:"死ぬ", a:"<b>來源：</b>GPT補充<br><b>尊敬語：</b>お亡くなりになる<br><b>謙讓語：</b>沒有固定特殊形<br><b>中文：</b>過世"},
  {q:"訪問する", a:"<b>來源：</b>GPT補充<br><b>尊敬語：</b>お越しになる／いらっしゃる<br><b>謙讓語：</b>伺う／訪問させていただく<br><b>中文：</b>拜訪／來訪"}
];

let index = 0;
const card = document.getElementById("card");
const frontWord = document.getElementById("frontWord");
const backAnswer = document.getElementById("backAnswer");
const counter = document.getElementById("counter");

let answerTimer = null;

function hideBackImmediately(){
  if(answerTimer) clearTimeout(answerTimer);
  card.classList.remove("showAnswer");
  backAnswer.innerHTML = "";
}

function render(){
  hideBackImmediately();
  card.classList.remove("flipped");
  frontWord.textContent = cards[index].q;
  counter.textContent = `${index + 1} / ${cards.length}`;

  // 等卡片回到正面後才放入背面答案，避免切換題目時背面被偷看到
  setTimeout(() => {
    if(!card.classList.contains("flipped")){
      backAnswer.innerHTML = cards[index].a;
    }
  }, 560);
}

function flipCard(){
  if(answerTimer) clearTimeout(answerTimer);

  if(card.classList.contains("flipped")){
    hideBackImmediately();
    card.classList.remove("flipped");

    // 翻回正面後再重新放回本題答案，下一次翻面才會顯示
    setTimeout(() => {
      if(!card.classList.contains("flipped")){
        backAnswer.innerHTML = cards[index].a;
      }
    }, 560);
  }else{
    backAnswer.innerHTML = cards[index].a;
    card.classList.add("flipped");
    answerTimer = setTimeout(() => {
      card.classList.add("showAnswer");
    }, 500);
  }
}

function nextCard(e){
  e.stopPropagation();
  hideBackImmediately();
  card.classList.remove("flipped");
  index = (index + 1) % cards.length;
  frontWord.textContent = cards[index].q;
  counter.textContent = `${index + 1} / ${cards.length}`;

  setTimeout(() => {
    if(!card.classList.contains("flipped")){
      backAnswer.innerHTML = cards[index].a;
    }
  }, 560);
}

function prevCard(e){
  e.stopPropagation();
  hideBackImmediately();
  card.classList.remove("flipped");
  index = (index - 1 + cards.length) % cards.length;
  frontWord.textContent = cards[index].q;
  counter.textContent = `${index + 1} / ${cards.length}`;

  setTimeout(() => {
    if(!card.classList.contains("flipped")){
      backAnswer.innerHTML = cards[index].a;
    }
  }, 560);
}
render();
</script>

</html>

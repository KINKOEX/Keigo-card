<!DOCTYPE html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .card-container {
            perspective: 1000px;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
        }
        .card {
            width: 100%;
            height: 100%;
            min-height: 300px;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .back {
            transform: rotateY(180deg);
        }
        h1 {
            color: #1e88e5;
            margin: 0 0 10px 0;
            font-size: 2em;
        }
        .meaning {
            color: #666;
            font-size: 1.1em;
            margin: 0 10px;
        }
        .example {
            margin-top: 20px;
            line-height: 1.6;
            color: #444;
            font-size: 1.1em;
            font-style: italic;
            padding: 0 10px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 20px;
        }
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #1e88e5;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            flex: 1;
            min-width: 80px;
            font-weight: bold;
        }
        button:active {
            transform: scale(0.95);
        }
        button:hover {
            background: #1565c0;
        }
        .btn-speak {
            background: #43a047;
            flex-basis: 100%;
        }
        .btn-speak:hover {
            background: #2e7d32;
        }
        .btn-flip {
            background: #fb8c00;
        }
        .btn-flip:hover {
            background: #ef6c00;
        }
        .counter {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .error-msg {
            color: red;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>

    <h2>英文單字卡 V3</h2>
    <div class="counter" id="counter">載入中...</div>

    <div class="card-container">
        <div class="card" id="card" onclick="flipCard()">

            </div>
            <div class="back" id="back">
                <h1 id="chinese"></h1>
                <p class="example" id="example"></p>
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="btn-speak" onclick="speak()">🔊 發音 (朗讀單字 / 例句)</button>
        <button class="btn-flip" onclick="flipCard()">🔄 翻面</button>
        <button onclick="prevCard()">⬅️ 上一張</button>
        <button onclick="randomCard()">🎲 隨機出題</button>
        <button onclick="nextCard()">下一張 ➡️</button>
    </div>

            { english: "gigabyte", engMeaning: "(n.) a unit of computer information consisting of 1,024 megabytes", chinese: "十億位元組", example: "The file is about one gigabyte in size." },
            { english: "trend", engMeaning: "(n.) a general development or change in a situation or in the way that people are behaving", chinese: "趨勢，潮流", example: "There is a growing trend towards remote working." },
            { english: "headphone jack", engMeaning: "(n.) the hole on a device where you plug in your headphones", chinese: "耳機孔", example: "Many modern phones no longer have a headphone jack." },
            { english: "continue", engMeaning: "(v.) to keep happening, existing, or doing something", chinese: "連續，繼續", example: "The rain will continue throughout the day." },
            { english: "farewell party", engMeaning: "(n.) a party held for someone who is leaving", chinese: "歡送會", example: "We threw a farewell party for him before he moved to Japan." },
            { english: "accommodation", engMeaning: "(n.) a place to live, work, stay, etc. in", chinese: "住處", example: "The price for the holiday includes flights and accommodation." },
            { english: "pleasure", engMeaning: "(n.) enjoyment, happiness, or satisfaction, or something that gives this", chinese: "愉快，歡樂", example: "It's a pleasure to meet you." },
            { english: "terminal", engMeaning: "(n.) the area or building at a station, airport, or port that is used by passengers leaving or arriving", chinese: "航廈，總站，終站", example: "Your flight will depart from Terminal 2." },
            { english: "seafront", engMeaning: "(n.) the part of a town that is next to the sea", chinese: "濱海區", example: "We walked along the seafront in the evening." },
            { english: "look forward to", engMeaning: "(phrase) to feel pleased and excited about something that is going to happen", chinese: "期待 / 盼望", example: "I look forward to hearing from you soon." },
            { english: "Go ahead", engMeaning: "(phrase) to start to do something", chinese: "開始吧！ / 儘管做吧！", example: "If you have a question, please go ahead and ask." },
            { english: "I'm afraid", engMeaning: "(phrase) used to politely introduce bad news or disagreement", chinese: "恐怕", example: "I'm afraid I can't attend the meeting tomorrow." },
            { english: "dress code", engMeaning: "(n.) a set of rules about what clothing may and may not be worn at a school, office, restaurant, etc.", chinese: "穿著要求", example: "The company has a very strict dress code." }
        ];

        function showCard() {
            const card = cards[currentIndex];

            if (!card) {
                throw new Error("找不到目前索引的單字卡：" + currentIndex);
            }

            document.getElementById("english").textContent = card.english;
            document.getElementById("eng-meaning").textContent = card.engMeaning;
            document.getElementById("chinese").textContent = card.chinese;
            document.getElementById("example").textContent = card.example;
            document.getElementById("counter").textContent = `${currentIndex + 1} / ${cards.length}`;
        }

        function changeCardAction(action) {
            const cardElement = document.getElementById("card");

            if (isFlipped) {
                isFlipped = false;
                cardElement.classList.remove("flipped");

                setTimeout(() => {
                    action();
                    showCard();
                }, 200);
            } else {
                action();
                showCard();
            }
        }

        function flipCard() {
            isFlipped = !isFlipped;
            document.getElementById("card").classList.toggle("flipped", isFlipped);
        }

        function nextCard() {
            changeCardAction(() => {
                currentIndex = (currentIndex + 1) % cards.length;
            });
        }

        function prevCard() {
            changeCardAction(() => {
                currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            });
        }

        function randomCard() {
            changeCardAction(() => {
                currentIndex = Math.floor(Math.random() * cards.length);
            });
        }

        function speak() {
            try {
                const card = cards[currentIndex];
                const text = isFlipped ? card.example : card.english;

                speechSynthesis.cancel();

                const utterance = new SpeechSynthesisUtterance(text);
                utterance.lang = "en-US";
                speechSynthesis.speak(utterance);
            } catch (e) {
                alert("目前瀏覽器不支援發音功能喔！");
            }
        }

        try {
            showCard();
        } catch (error) {
            document.getElementById("english").textContent = "發生錯誤 🐞";
            document.getElementById("eng-meaning").innerHTML = `<span class="error-msg">請檢查程式碼是否完整複製，或更換瀏覽器開啟。錯誤原因：${error.message}</span>`;
            console.error("單字卡載入失敗:", error);
        }
    </script>
</body>
</html>

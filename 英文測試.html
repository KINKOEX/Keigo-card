    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h2 {
            text-align: center;
            color: #333;
            margin-top: 10px;
            margin-bottom: 20px;
        }
        .card-container {
            perspective: 1000px;
            flex: 1;
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 500px;
            margin: 0 auto 20px auto;
        }
        .card {
            width: 100%;
            height: 100%;
            min-height: 300px;
            position: relative;
            transition: transform 0.6s cubic-bezier(0.4, 0.2, 0.2, 1);
            transform-style: preserve-3d;
            cursor: pointer;
        }
        .card.flipped {
            transform: rotateY(180deg);
        }
        .front, .back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .back {
            transform: rotateY(180deg);
        }
        h1 {
            color: #1e88e5;
            margin: 0 0 10px 0;
            font-size: 2em;
        }
        .meaning {
            color: #666;
            font-size: 1.1em;
            margin: 0 10px;
        }
        .example {
            margin-top: 20px;
            line-height: 1.6;
            color: #444;
            font-size: 1.1em;
            font-style: italic;
            padding: 0 10px;
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            padding-bottom: 20px;
        }
        button {
            padding: 12px 18px;
            border: none;
            border-radius: 8px;
            background: #1e88e5;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            flex: 1;
            min-width: 80px;
            font-weight: bold;
        }
        button:active {
            transform: scale(0.95);
        }
        button:hover {
            background: #1565c0;
        }
        .btn-speak {
            background: #43a047;
            flex-basis: 100%;
        }
        .btn-speak:hover {
            background: #2e7d32;
        }
        .btn-flip {
            background: #fb8c00;
        }
        .btn-flip:hover {
            background: #ef6c00;
        }
        .counter {
            text-align: center;
            color: #888;
            margin-bottom: 10px;
            font-size: 0.9em;
        }
        .error-msg {
            color: red;
            font-size: 0.9em;
            margin-top: 10px;
        }
    </style>
</head>

                <p class="example" id="example"></p>
            </div>
        </div>
    </div>

    <div class="controls">

        <button onclick="randomCard()">🎲 隨機出題</button>

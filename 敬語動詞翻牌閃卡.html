<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>敬語動詞翻牌閃卡</title>
<style>
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC","Helvetica Neue",Arial,sans-serif;
    background:#f6efe6;
    color:#2f261f;
    display:flex;
    flex-direction:column;
    align-items:center;
    min-height:100vh;
  }
  header{
    width:100%;
    text-align:center;
    padding:22px 12px 10px;
  }
  h1{font-size:1.55rem;margin:0 0 8px;}
  .hint{font-size:.95rem;color:#6e5d50;}
  .wrap{
    width:min(92vw,430px);
    margin-top:12px;
  }
  .counter{
    text-align:center;
    margin:10px 0 14px;
    color:#7b4d35;
    font-weight:700;
  }
  .card{
    height:340px;
    perspective:1000px;
    cursor:pointer;
  }
  .inner{
    width:100%;
    height:100%;
    position:relative;
    transition:transform .55s;
    transform-style:preserve-3d;
  }
  .card.flipped .inner{transform:rotateY(180deg);}
  .face{
    position:absolute;
    inset:0;
    border-radius:24px;
    backface-visibility:hidden;
    box-shadow:0 12px 28px rgba(0,0,0,.16);
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    padding:26px;
    box-sizing:border-box;
    text-align:center;
  }
  .front{
    background:#fffaf2;
    border:2px solid #c8452d;
  }
  .back{
    background:#2f261f;
    color:#fffaf2;
    transform:rotateY(180deg);
    border:2px solid #d9b36c;
  }
  .label{
    font-size:.9rem;
    letter-spacing:.1em;
    color:#9b4a36;
    margin-bottom:16px;
  }
  .back .label{color:#e6c77c;}
  .word{
    font-size:2.6rem;
    font-weight:800;
    margin-bottom:12px;
  }
  .kana{
    font-size:1.1rem;
    color:#7b6a5d;
  }
  .back .kana{color:#e8d8bd;}
  .answer{
    font-size:1.2rem;
    line-height:1.9;
  }
  .answer b{color:#ffd88a;}
  button{
    border:none;
    border-radius:999px;
    padding:12px 18px;
    margin:18px 6px;
    font-size:1rem;
    font-weight:700;
    background:#c8452d;
    color:white;
  }
  button.secondary{
    background:#7b6a5d;
  }
  .buttons{text-align:center;}
  .mini{
    font-size:.85rem;
    color:#78685e;
    text-align:center;
    margin-top:2px;
  }
</style>
</head>
<body>
<header>
  <h1>敬語動詞翻牌閃卡</h1>
  <div class="hint">點卡片翻面，左右按鈕切換題目</div>
</header>

<div class="wrap">
  <div class="counter" id="counter"></div>

  <div class="card" id="card" onclick="flipCard()">
    <div class="inner">
      <div class="face front">
        <div class="label">普通形</div>
        <div class="word" id="frontWord"></div>
        <div class="kana" id="frontHint">點一下看敬語</div>
      </div>
      <div class="face back">
        <div class="label">敬語答案</div>
        <div class="answer" id="backAnswer"></div>
      </div>
    </div>
  </div>

  <div class="buttons">
    <button class="secondary" onclick="prevCard(event)">上一張</button>
    <button onclick="nextCard(event)">下一張</button>
  </div>
  <div class="mini">建議：先看到普通形，自己想「尊敬語／謙讓語」再翻面。</div>
</div>

<script>
const cards = [
  {q:"言う", a:"<b>尊敬語：</b>おっしゃる<br><b>謙讓語：</b>申す／申し上げる<br><b>中文：</b>說"},
  {q:"行く", a:"<b>尊敬語：</b>いらっしゃる／おいでになる<br><b>謙讓語：</b>参る<br><b>中文：</b>去"},
  {q:"来る", a:"<b>尊敬語：</b>いらっしゃる／おいでになる／お見えになる／お越しになる<br><b>謙讓語：</b>参る<br><b>中文：</b>來"},
  {q:"いる", a:"<b>尊敬語：</b>いらっしゃる／おいでになる<br><b>謙讓語：</b>おる<br><b>中文：</b>在"},
  {q:"食べる", a:"<b>尊敬語：</b>召し上がる<br><b>謙讓語：</b>いただく<br><b>中文：</b>吃"},
  {q:"飲む", a:"<b>尊敬語：</b>召し上がる<br><b>謙讓語：</b>いただく<br><b>中文：</b>喝"},
  {q:"する", a:"<b>尊敬語：</b>なさる<br><b>謙讓語：</b>致す<br><b>中文：</b>做"},
  {q:"見る", a:"<b>尊敬語：</b>ご覧になる<br><b>謙讓語：</b>拝見する<br><b>中文：</b>看"},
  {q:"くれる", a:"<b>尊敬語：</b>くださる<br><b>謙讓語：</b>なし<br><b>中文：</b>別人給我"},
  {q:"もらう", a:"<b>尊敬語：</b>なし<br><b>謙讓語：</b>いただく<br><b>中文：</b>收到／領受"},
  {q:"あげる", a:"<b>尊敬語：</b>なし<br><b>謙讓語：</b>差し上げる<br><b>中文：</b>我給別人"},
  {q:"知っている", a:"<b>尊敬語：</b>ご存じです<br><b>謙讓語：</b>存じております<br><b>中文：</b>知道"},
  {q:"聞く／尋ねる", a:"<b>尊敬語：</b>お聞きになる／お尋ねになる<br><b>謙讓語：</b>伺う／お尋ね致す<br><b>中文：</b>詢問／請教"},
  {q:"会う", a:"<b>尊敬語：</b>お会いになる<br><b>謙讓語：</b>お目にかかる<br><b>中文：</b>見面"},
  {q:"思う", a:"<b>尊敬語：</b>お思いになる<br><b>謙讓語：</b>存じる／存ずる<br><b>中文：</b>認為"},
  {q:"寝る", a:"<b>尊敬語：</b>お休みになる<br><b>謙讓語：</b>なし<br><b>中文：</b>睡覺"},
  {q:"着る", a:"<b>尊敬語：</b>お召しになる<br><b>謙讓語：</b>なし<br><b>中文：</b>穿"},
  {q:"死ぬ", a:"<b>尊敬語：</b>お亡くなりになる<br><b>謙讓語：</b>なし<br><b>中文：</b>過世"},
  {q:"読む", a:"<b>尊敬語：</b>お読みになる<br><b>謙讓語：</b>拝読する<br><b>中文：</b>閱讀／拜讀"},
  {q:"借りる", a:"<b>尊敬語：</b>お借りになる<br><b>謙讓語：</b>拝借する<br><b>中文：</b>借"},
  {q:"聞く（聽）", a:"<b>尊敬語：</b>お聞きになる<br><b>謙讓語：</b>拝聴する<br><b>中文：</b>聽／聆聽"},
  {q:"見せる", a:"<b>尊敬語：</b>お見せになる<br><b>謙讓語：</b>お目にかける<br><b>中文：</b>給人看"}
];

let index = 0;
const card = document.getElementById("card");
const frontWord = document.getElementById("frontWord");
const backAnswer = document.getElementById("backAnswer");
const counter = document.getElementById("counter");

function render(){
  card.classList.remove("flipped");
  frontWord.textContent = cards[index].q;
  backAnswer.innerHTML = cards[index].a;
  counter.textContent = `${index + 1} / ${cards.length}`;
}
function flipCard(){
  card.classList.toggle("flipped");
}
function nextCard(e){
  e.stopPropagation();
  index = (index + 1) % cards.length;
  render();
}
function prevCard(e){
  e.stopPropagation();
  index = (index - 1 + cards.length) % cards.length;
  render();
}
render();
</script>
</body>
</html>
